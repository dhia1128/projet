<html>
<head>
    <title>Info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Informations sur les données</h1>
        <pre>{df.info()}</pre>
    </div>
    <div> class="container mt-5">
        <h2 class="mb-4">Aperçu des données</h2>
        <pre>{df.head().to_string()}</pre>
    </div>
    <div class="container mt-5">
        <h2 class="mb-4">Description des données</h2>
        <pre>{df.describe()}</pre>
    </div>
    <div class="container mt-5">
        <h2 class="mb-4">Valeurs manquantes</h2>
        <pre>{df.isnull().sum()}</pre>
    </div>
    <div class="container mt-5">
        <h2 class="mb-4">Valeurs dupliquées</h2>
        <pre>{df.duplicated().sum()}</pre>
    </div>
</body> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</html>
