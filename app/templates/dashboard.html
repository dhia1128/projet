<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TollXpress - Dashboard Analytique</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.75rem;
        }
        
        .dashboard-header {
            background: linear-gradient(135deg, #0d6efd, #5c7292);
            color: white;
            padding: 2.5rem 0;
            margin-bottom: 2rem;
        }
        
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-6px);
        }
        
        .card-header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 1rem 1.5rem;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0;
        }
        
        iframe {
            width: 100%;
            height: 480px;
            border: none;
            display: block;
        }
        
        .plot-container {
            background: white;
            padding: 10px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/home">
                <i class="bi bi-speedometer2 me-2 fs-3"></i> TollXpress
            </a>
            <div class="d-flex align-items-center gap-3">
                <a class="text-white text-decoration-none" href="/home">Accueil</a>
                <a class="text-white text-decoration-none" href="/traffic/stats" target="_blank">Stats Trafic</a>
                <span class="navbar-text fs-5">Dashboard Analytique Interactif</span>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="dashboard-header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold mb-2"> Tableau de Bord Principal</h1>
            <p class="lead mb-0">Visualisation en temps réel des performances du réseau de péage</p>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row g-4">

            <!-- Transactions par Heure -->
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-header d-flex align-items-center">
                        <i class="bi bi-clock-history text-success fs-4 me-3"></i>
                        <h5 class="card-title">Transactions par Heure</h5>
                    </div>
                    <div class="plot-container">
                        <iframe src="/plot/hourly_transactions"></iframe>
                    </div>
                </div>
            </div>

            <!-- CA Gare -->
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-header d-flex align-items-center">
                        <i class="bi bi-building text-warning fs-4 me-3"></i>
                        <h5 class="card-title">Top 10 Gares par Chiffre d'Affaires</h5>
                    </div>
                    <div class="plot-container">
                        <iframe src="/plot/ca_gare"></iframe>
                    </div>
                </div>
            </div>

            <!-- CA par Jour de Semaine -->
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-header d-flex align-items-center">
                        <i class="bi bi-calendar-week text-info fs-4 me-3"></i>
                        <h5 class="card-title">CA par Jour de Semaine</h5>
                    </div>
                    <div class="plot-container">
                        <iframe src="/plot/weekday_revenue"></iframe>
                    </div>
                </div>
            </div>

            <!-- CA Mensuel par Paiement -->
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-header d-flex align-items-center">
                        <i class="bi bi-calendar3 text-danger fs-4 me-3"></i>
                        <h5 class="card-title">CA Mensuel par Type de Paiement</h5>
                    </div>
                    <div class="plot-container">
                        <iframe src="/plot/monthly_payment"></iframe>
                    </div>
                </div>
            </div>

            <!-- Prévision Prophet -->


        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">
                 Dashboard Interactif 
            </p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
