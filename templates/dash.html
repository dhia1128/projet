<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #333; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card h3 { margin: 0 0 10px; font-size: 14px; color: #555; }
    iframe { width: 100%; height: 420px; border: none; }
  </style>
</head>
<body>
  <h1>ML Dashboard</h1>
  <div class="grid">
    <div class="card">
      <h3>Montant</h3>
      <iframe src="http://localhost:8000/plot/montant"></iframe>
    </div>
    <div class="card">
      <h3>CA Gare</h3>
      <iframe src="http://localhost:8000/plot/ca_gare"></iframe>
    </div>
    <div class="card">
      <h3>Véhicule</h3>
      <iframe src="http://localhost:8000/plot/vehicule"></iframe>
    </div>
    <div class="card">
      <h3>Daily</h3>
      <iframe src="http://localhost:8000/plot/daily"></iframe>
    </div>
  </div>
</body>
</html>
